<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>303 News</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 17px;
            line-height: 1.6;
            color: #1a1a1a;
            background-color: #f5f0e8;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* --- Header --- */
        .site-header {
            text-align: center;
            padding: 28px 0 24px;
            border-bottom: 3px double #1a1a1a;
            margin-bottom: 32px;
        }

        .site-title {
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #1a1a1a;
            line-height: 1.2;
        }

        .site-subtitle {
            font-size: 0.88em;
            font-style: italic;
            color: #666;
            margin-top: 6px;
        }

        /* --- Subscribe form --- */
        .subscribe-section {
            text-align: center;
            padding: 24px 16px;
            margin-bottom: 32px;
            border-bottom: 1px solid #ccc;
        }

        .subscribe-tagline {
            font-size: 0.95em;
            color: #444;
            margin-bottom: 14px;
            font-style: italic;
        }

        .subscribe-form {
            display: flex;
            gap: 8px;
            max-width: 420px;
            margin: 0 auto;
        }

        .subscribe-form input[type="email"] {
            flex: 1;
            padding: 10px 14px;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 0.92em;
            border: 1px solid #aaa;
            background: #fff;
            color: #1a1a1a;
            min-width: 0;
        }

        .subscribe-form input[type="email"]::placeholder {
            color: #999;
        }

        .subscribe-form input[type="email"]:focus {
            outline: none;
            border-color: #1a3a6a;
        }

        .subscribe-form button {
            padding: 10px 20px;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 0.88em;
            font-weight: 700;
            letter-spacing: 0.05em;
            background: #1a1a1a;
            color: #f5f0e8;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .subscribe-form button:hover {
            background: #333;
        }

        .subscribe-msg {
            font-size: 0.82em;
            margin-top: 10px;
            min-height: 1.2em;
            color: #666;
            font-style: italic;
        }

        .subscribe-msg.success {
            color: #2d6a2e;
        }

        .subscribe-msg.error {
            color: #8b1a1a;
        }

        /* --- Daily Comic --- */
        .comic-section {
            text-align: center;
            padding: 18px 16px;
            margin: 12px 0 8px 0;
            border-top: 1px solid #ddd;
        }

        .comic-label {
            font-size: 0.78em;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .comic-link {
            display: inline-block;
            font-size: 1.05em;
            color: #1a3a6a;
            text-decoration: none;
            border-bottom: 1px dotted #1a3a6a;
            line-height: 1.5;
        }

        .comic-link:hover {
            color: #8b1a1a;
            border-bottom-color: #8b1a1a;
        }

        .comic-teaser {
            font-size: 0.9em;
            color: #555;
            font-style: italic;
            margin-top: 6px;
            line-height: 1.5;
        }

        .comic-credit {
            font-size: 0.75em;
            color: #999;
            font-style: italic;
            margin-top: 4px;
        }

        /* --- Empty state --- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-style: italic;
            font-size: 1.05em;
        }

        /* --- Day sections --- */
        .day-section {
            margin-bottom: 28px;
        }

        .day-header {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 6px 10px;
            padding: 12px 0;
            cursor: pointer;
            border-bottom: 1px solid #cccccc;
            user-select: none;
            -webkit-user-select: none;
            min-height: 48px;
        }

        .day-header:hover {
            opacity: 0.8;
        }

        .day-arrow {
            font-size: 0.7em;
            color: #888;
            transition: transform 0.2s ease;
            flex-shrink: 0;
            width: 14px;
            text-align: center;
        }

        .day-section.open > .day-header .day-arrow {
            transform: rotate(90deg);
        }

        .day-date {
            font-size: 1.2em;
            font-weight: 700;
            color: #444;
        }

        .day-section.today > .day-header .day-date {
            color: #8b1a1a;
        }

        .day-count {
            font-size: 0.82em;
            color: #888;
            font-style: italic;
        }

        .day-content {
            display: none;
            padding-top: 8px;
        }

        .day-section.open > .day-content {
            display: block;
        }

        /* --- Category sections --- */
        .category-section {
            margin-bottom: 24px;
        }

        .category-header {
            font-size: 0.85em;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: #444444;
            text-transform: uppercase;
            padding: 10px 0 6px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 10px;
        }

        /* --- Story items --- */
        .story-item {
            margin-bottom: 6px;
        }

        .story-headline {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 10px 0;
            cursor: pointer;
            min-height: 44px;
            user-select: none;
            -webkit-user-select: none;
        }

        .story-headline:hover .story-title {
            color: #8b1a1a;
        }

        .story-arrow {
            font-size: 0.65em;
            color: #999;
            transition: transform 0.2s ease;
            flex-shrink: 0;
            margin-top: 4px;
            width: 12px;
            text-align: center;
        }

        .story-item.open > .story-headline .story-arrow {
            transform: rotate(90deg);
        }

        .story-title {
            font-size: 1.1em;
            color: #1a3a6a;
            line-height: 1.4;
            transition: color 0.15s ease;
        }

        /* --- Story summary (expanded) --- */
        .story-body {
            display: none;
            padding: 12px 0 16px 20px;
            border-left: 2px solid #ddd;
            margin-left: 6px;
            margin-bottom: 10px;
        }

        .story-item.open > .story-body {
            display: block;
        }

        .story-body p {
            font-size: 1.05em;
            line-height: 1.8;
            color: #222;
            margin-bottom: 1em;
        }

        .story-body p:last-child {
            margin-bottom: 0.5em;
        }

        .story-source {
            font-size: 0.88em;
            font-style: italic;
            color: #666;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px dotted #ddd;
        }

        .story-source a {
            color: #1a3a6a;
            text-decoration: none;
            border-bottom: 1px dotted #1a3a6a;
        }

        .story-source a:hover {
            color: #8b1a1a;
            border-bottom-color: #8b1a1a;
        }

        /* --- Footer --- */
        .site-footer {
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
            border-top: 1px solid #cccccc;
            font-size: 0.82em;
            color: #888;
            font-style: italic;
        }

        /* --- Mobile text bump (under 600px) --- */
        @media (max-width: 599px) {
            body {
                font-size: 18px;
            }
        }

        /* --- Small mobile tweaks (under 400px) --- */
        @media (max-width: 399px) {
            .site-title {
                font-size: 1.6em;
            }

            .day-date {
                font-size: 1.05em;
            }
        }

        /* --- Desktop styles (600px+) --- */
        @media (min-width: 600px) {
            .container {
                padding: 32px 24px 60px;
            }

            .site-header {
                padding: 36px 0 28px;
                margin-bottom: 40px;
            }

            .site-title {
                font-size: 2.4em;
            }

            .day-section {
                margin-bottom: 32px;
            }

            .story-body {
                padding-left: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <h1 class="site-title"><span style="color:#8b1a1a">303</span> NEWS</h1>
            <p class="site-subtitle">Denver Metro Area -- Local News Digest</p>
        </header>

        <div class="subscribe-section">
            <p class="subscribe-tagline">No ads and no BS, just clean daily news.</p>
            <form class="subscribe-form" id="subscribe-form"
                  action="https://buttondown.com/api/emails/embed-subscribe/jimcoleman1"
                  method="post" target="subscribe-target">
                <input type="email" name="email" placeholder="Your email" required id="subscribe-email" autocomplete="email">
                <input type="hidden" name="embed" value="1">
                <input type="hidden" name="tag" value="website">
                <button type="submit">SUBSCRIBE</button>
            </form>
            <iframe name="subscribe-target" id="subscribe-target" style="display:none"></iframe>
            <p class="subscribe-msg" id="subscribe-msg"></p>
        </div>

        <main id="digest-content">
            <div class="empty-state">Loading...</div>
        </main>

        <footer class="site-footer">
            303 News -- Updated daily at 7:00 AM MT
        </footer>
    </div>

    <script>
        (function() {
            'use strict';

            var CATEGORY_ORDER = ['other', 'politics', 'business', 'crime', 'sports'];
            var CATEGORY_LABELS = {
                other: 'GENERAL / METRO NEWS',
                politics: 'POLITICS & GOVERNMENT',
                business: 'BUSINESS & ECONOMY',
                crime: 'CRIME & PUBLIC SAFETY',
                sports: 'SPORTS'
            };

            // --- Subscribe form ---
            var subForm = document.getElementById('subscribe-form');
            var subEmail = document.getElementById('subscribe-email');
            var subMsg = document.getElementById('subscribe-msg');

            var subTarget = document.getElementById('subscribe-target');

            subForm.addEventListener('submit', function() {
                var email = subEmail.value.trim();
                if (!email) return;
                subMsg.textContent = 'Subscribing...';
                subMsg.className = 'subscribe-msg';
            });

            subTarget.addEventListener('load', function() {
                if (!subEmail.value && !subMsg.textContent) return;
                subMsg.textContent = "You're in! Check your email to confirm, then watch for your first digest.";
                subMsg.className = 'subscribe-msg success';
                subEmail.value = '';
            });

            // --- Digest rendering ---
            var storyIndex = 0; // global counter for story IDs

            function getLastNDates(n) {
                var dates = [];
                var now = new Date();
                for (var i = 0; i < n; i++) {
                    var d = new Date(now);
                    d.setDate(d.getDate() - i);
                    var year = d.getFullYear();
                    var month = String(d.getMonth() + 1).padStart(2, '0');
                    var day = String(d.getDate()).padStart(2, '0');
                    dates.push(year + '-' + month + '-' + day);
                }
                return dates;
            }

            function getTodayStr() {
                var d = new Date();
                var year = d.getFullYear();
                var month = String(d.getMonth() + 1).padStart(2, '0');
                var day = String(d.getDate()).padStart(2, '0');
                return year + '-' + month + '-' + day;
            }

            function groupByCategory(stories) {
                var groups = {};
                for (var i = 0; i < stories.length; i++) {
                    var cat = stories[i].category || 'other';
                    if (!CATEGORY_LABELS[cat]) cat = 'other';
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(stories[i]);
                }
                return groups;
            }

            function summaryToHTML(summary) {
                if (!summary) return '';
                var paragraphs = summary.split('\n\n');
                var html = '';
                for (var i = 0; i < paragraphs.length; i++) {
                    var text = paragraphs[i].trim();
                    if (text) {
                        html += '<p>' + escapeHTML(text) + '</p>';
                    }
                }
                return html;
            }

            function escapeHTML(str) {
                var div = document.createElement('div');
                div.appendChild(document.createTextNode(str));
                return div.innerHTML;
            }

            function renderStory(story, dateStr, idx) {
                var item = document.createElement('div');
                item.className = 'story-item';
                item.id = 'story-' + dateStr + '-' + idx;

                var headline = document.createElement('div');
                headline.className = 'story-headline';
                headline.innerHTML = '<span class="story-arrow">&#9656;</span>' +
                    '<span class="story-title">' + escapeHTML(story.headline) + '</span>';

                headline.addEventListener('click', function() {
                    item.classList.toggle('open');
                });

                var body = document.createElement('div');
                body.className = 'story-body';
                body.innerHTML = summaryToHTML(story.summary);

                var source = document.createElement('div');
                source.className = 'story-source';
                source.innerHTML = 'Source: <a href="' + escapeHTML(story.url) +
                    '" target="_blank" rel="noopener noreferrer">' +
                    escapeHTML(story.source) + '</a>';
                body.appendChild(source);

                item.appendChild(headline);
                item.appendChild(body);
                return item;
            }

            function renderDay(data, isToday) {
                var section = document.createElement('div');
                section.className = 'day-section' + (isToday ? ' today' : '');
                section.setAttribute('data-date', data.date);

                var header = document.createElement('div');
                header.className = 'day-header';
                var storyCount = data.stories ? data.stories.length : 0;
                var countWord = storyCount === 1 ? 'story' : 'stories';
                header.innerHTML = '<span class="day-arrow">&#9654;</span>' +
                    '<span class="day-date">' + escapeHTML(data.dateFormatted) + '</span>' +
                    '<span class="day-count">' + storyCount + ' ' + countWord + '</span>';

                header.addEventListener('click', function() {
                    section.classList.toggle('open');
                });

                var content = document.createElement('div');
                content.className = 'day-content';

                if (data.stories && data.stories.length > 0) {
                    var groups = groupByCategory(data.stories);
                    var globalIdx = 0;
                    for (var c = 0; c < CATEGORY_ORDER.length; c++) {
                        var cat = CATEGORY_ORDER[c];
                        if (!groups[cat] || groups[cat].length === 0) continue;

                        var catSection = document.createElement('div');
                        catSection.className = 'category-section';

                        var catHeader = document.createElement('div');
                        catHeader.className = 'category-header';
                        catHeader.textContent = CATEGORY_LABELS[cat];
                        catSection.appendChild(catHeader);

                        for (var s = 0; s < groups[cat].length; s++) {
                            catSection.appendChild(renderStory(groups[cat][s], data.date, globalIdx));
                            globalIdx++;
                        }

                        content.appendChild(catSection);
                    }
                }

                // Daily Comic section (from JSON comic field)
                if (data.comic && data.comic.url) {
                    var comicDiv = document.createElement('div');
                    comicDiv.className = 'comic-section';

                    var label = document.createElement('div');
                    label.className = 'comic-label';
                    label.textContent = 'DAILY COMIC';
                    comicDiv.appendChild(label);

                    var link = document.createElement('a');
                    link.className = 'comic-link';
                    link.href = data.comic.url;
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                    link.textContent = "Today's Far Side";
                    comicDiv.appendChild(link);

                    if (data.comic.teaser) {
                        var teaser = document.createElement('div');
                        teaser.className = 'comic-teaser';
                        teaser.textContent = data.comic.teaser;
                        comicDiv.appendChild(teaser);
                    }

                    var credit = document.createElement('div');
                    credit.className = 'comic-credit';
                    credit.textContent = 'by Gary Larson';
                    comicDiv.appendChild(credit);

                    content.appendChild(comicDiv);
                }

                section.appendChild(header);
                section.appendChild(content);

                // Auto-expand today
                if (isToday) {
                    section.classList.add('open');
                }

                return section;
            }

            function handleDeepLink() {
                var hash = window.location.hash;
                if (!hash || hash.length < 2) return;

                // Format: #story-YYYY-MM-DD-N
                var match = hash.match(/^#story-(\d{4}-\d{2}-\d{2})-(\d+)$/);
                if (!match) return;

                var targetDate = match[1];
                var targetIdx = parseInt(match[2], 10);
                var storyId = 'story-' + targetDate + '-' + targetIdx;

                // Find the day section and expand it
                var daySection = document.querySelector('.day-section[data-date="' + targetDate + '"]');
                if (daySection) {
                    daySection.classList.add('open');
                }

                // Find the story and expand it
                var storyEl = document.getElementById(storyId);
                if (storyEl) {
                    storyEl.classList.add('open');
                    // Scroll into view after a brief delay for DOM to update
                    setTimeout(function() {
                        storyEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                }
            }

            function init() {
                var dates = getLastNDates(7);
                var todayStr = getTodayStr();
                var container = document.getElementById('digest-content');
                var loadedCount = 0;
                var pending = dates.length;

                var results = {};

                dates.forEach(function(dateStr) {
                    fetch('site/data/' + dateStr + '.json')
                        .then(function(resp) {
                            if (!resp.ok) throw new Error('Not found');
                            return resp.json();
                        })
                        .then(function(data) {
                            results[dateStr] = data;
                            loadedCount++;
                        })
                        .catch(function() {
                            // silently skip missing dates
                        })
                        .finally(function() {
                            pending--;
                            if (pending === 0) {
                                renderAll(dates, results, todayStr, container, loadedCount);
                                handleDeepLink();
                            }
                        });
                });
            }

            function renderAll(dates, results, todayStr, container, loadedCount) {
                container.innerHTML = '';

                if (loadedCount === 0) {
                    container.innerHTML = '<div class="empty-state">No stories available yet. Check back tomorrow morning.</div>';
                    return;
                }

                for (var i = 0; i < dates.length; i++) {
                    var dateStr = dates[i];
                    if (!results[dateStr]) continue;
                    var isToday = (dateStr === todayStr);
                    container.appendChild(renderDay(results[dateStr], isToday));
                }
            }

            // Handle hash changes (e.g., back/forward navigation)
            window.addEventListener('hashchange', handleDeepLink);

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
