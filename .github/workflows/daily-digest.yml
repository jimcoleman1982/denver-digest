name: 303 News Daily Digest

on:
  schedule:
    # Two cron schedules for DST-aware 5:45 AM Denver local time:
    # 11:45 UTC = 5:45 AM MDT (March-November)
    # 12:45 UTC = 5:45 AM MST (November-March)
    # The Python script checks Denver local time and skips if too early,
    # so only the correct schedule produces output on any given day.
    - cron: '45 11 * * *'
    - cron: '45 12 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

permissions:
  contents: write  # Needed to commit and push JSON data files

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ARGS="--force"
            if [ -n "${{ github.event.inputs.date }}" ]; then
              ARGS="$ARGS --date ${{ github.event.inputs.date }}"
            fi
          fi
          python scripts/generate_digest.py $ARGS

      - name: Prune old data files (keep 14 days)
        run: |
          cd site/data
          ls -1 *.json 2>/dev/null | sort | head -n -14 | xargs -r rm -f

      - name: Commit and push
        run: |
          git config user.name "303 News Bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add site/data/
          git diff --cached --quiet && echo "No new data" && exit 0
          git commit -m "Add digest for $(date +%Y-%m-%d)"
          git push
