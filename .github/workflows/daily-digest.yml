name: 303 News Daily Digest

on:
  schedule:
    # BACKUP ONLY -- Primary trigger is cron-job.org via workflow_dispatch.
    # These fire at 6:00 AM Denver local time year-round as a safety net if
    # the primary misses. The script's DST guard ensures only the correct
    # timezone's cron actually generates output; the wrong one exits cleanly.
    # The script also skips if today's digest already exists, so no duplicate
    # work even if both primary and backup fire.
    #   12:00 UTC = 6:00 AM MDT (March-November)
    #   13:00 UTC = 6:00 AM MST (November-March)
    # The 14:00 UTC run is a deploy-verification pass: generation no-ops
    # (digest already exists) but the verify step below confirms the live
    # site is actually serving today's data and re-kicks Pages if not.
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

permissions:
  contents: write  # Needed to commit and push JSON data files
  pages: write     # Needed to request Pages rebuilds when a deploy fails
  issues: write    # Needed by the failure-notification step

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ARGS="--force"
          fi
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          python scripts/generate_digest.py $ARGS

      - name: Prune old data files (keep 14 days)
        run: |
          cd site/data
          ls -1 *.json 2>/dev/null | sort | head -n -14 | xargs -r rm -f

      - name: Commit and push (with retry)
        run: |
          git config user.name "303 News Bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add site/data/
          git diff --cached --quiet && echo "No new data" && exit 0
          git commit -m "Add digest for $(date +%Y-%m-%d)"
          # Retry the push up to 5 times with backoff. Handles two failure modes:
          # 1. Transient GitHub server errors (e.g. "fatal error in commit_refs"
          #    -- this exact error happened on 2026-05-27 and silently dropped
          #    that day's data even though the email had already been sent)
          # 2. Concurrent pushes from other workflow runs
          # Pull --rebase before each retry to absorb any new commits on origin.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed."
            if [ $attempt -lt 5 ]; then
              backoff=$((attempt * 30))
              echo "Pulling --rebase and retrying in ${backoff}s..."
              git pull --rebase --autostash || echo "Rebase failed -- will retry push anyway"
              sleep $backoff
            fi
          done
          echo "ERROR: All push attempts failed. The digest was generated and the"
          echo "email was sent, but the data was not committed to the repo."
          echo "Investigate GitHub status or manual conflict."
          exit 1

      - name: Verify today's digest is live (rebuild Pages if not)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A successful push does not mean the site updated: GitHub's Pages
          # build can error or hang afterward (2026-07-04: deploy errored,
          # the build sat in "building" for hours, and the site served stale
          # data all morning). Poll the live site for today's data; if it
          # isn't served, request a fresh Pages build and poll again.
          TODAY=$(TZ=America/Denver date +%F)
          # Nothing to verify if today's digest doesn't exist yet (e.g. the
          # early backup cron firing before the primary trigger, or the DST
          # guard exiting cleanly).
          if [ ! -f "site/data/${TODAY}.json" ]; then
            echo "No data file for ${TODAY} in the repo yet -- skipping."
            exit 0
          fi
          URL="https://303news.org/site/data/${TODAY}.json"
          for attempt in 1 2 3; do
            for i in $(seq 1 16); do
              if [ "$(curl -s -o /dev/null -w '%{http_code}' "$URL")" = "200" ]; then
                echo "Live on attempt $attempt: $URL"
                exit 0
              fi
              sleep 15
            done
            echo "Attempt $attempt: $URL is still not live."
            if [ $attempt -lt 3 ]; then
              echo "Requesting a fresh Pages build..."
              gh api "repos/${GITHUB_REPOSITORY}/pages/builds" -X POST || true
            fi
          done
          echo "ERROR: Today's digest is not live on 303news.org after repeated"
          echo "Pages rebuild requests. GitHub Pages may be having an incident."
          exit 1

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `303 News digest failure - ${today}`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug'
            });
            if (open.some(i => i.title === title)) {
              console.log('Issue already open for today -- not filing a duplicate.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `A step in today's digest run failed -- either the digest generation, the data push, or the live-site verification. The email may already have been sent.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug']
            });
