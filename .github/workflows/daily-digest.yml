name: 303 News Daily Digest

on:
  schedule:
    # BACKUP ONLY -- Primary trigger is cron-job.org via workflow_dispatch.
    # These fire at 6:00 AM Denver local time year-round as a safety net if
    # the primary misses. The script's DST guard ensures only the correct
    # timezone's cron actually generates output; the wrong one exits cleanly.
    # The script also skips if today's digest already exists, so no duplicate
    # work even if both primary and backup fire.
    #   12:00 UTC = 6:00 AM MDT (March-November)
    #   13:00 UTC = 6:00 AM MST (November-March)
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

permissions:
  contents: write  # Needed to commit and push JSON data files

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ARGS="--force"
          fi
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          python scripts/generate_digest.py $ARGS

      - name: Prune old data files (keep 14 days)
        run: |
          cd site/data
          ls -1 *.json 2>/dev/null | sort | head -n -14 | xargs -r rm -f

      - name: Commit and push (with retry)
        run: |
          git config user.name "303 News Bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add site/data/
          git diff --cached --quiet && echo "No new data" && exit 0
          git commit -m "Add digest for $(date +%Y-%m-%d)"
          # Retry the push up to 5 times with backoff. Handles two failure modes:
          # 1. Transient GitHub server errors (e.g. "fatal error in commit_refs"
          #    -- this exact error happened on 2026-05-27 and silently dropped
          #    that day's data even though the email had already been sent)
          # 2. Concurrent pushes from other workflow runs
          # Pull --rebase before each retry to absorb any new commits on origin.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed."
            if [ $attempt -lt 5 ]; then
              backoff=$((attempt * 30))
              echo "Pulling --rebase and retrying in ${backoff}s..."
              git pull --rebase --autostash || echo "Rebase failed -- will retry push anyway"
              sleep $backoff
            fi
          done
          echo "ERROR: All push attempts failed. The digest was generated and the"
          echo "email was sent, but the data was not committed to the repo."
          echo "Investigate GitHub status or manual conflict."
          exit 1

      - name: Notify on push failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `303 News digest push failed - ${new Date().toISOString().slice(0,10)}`,
              body: `The digest was generated and the email may have been sent, but the data push to the repo failed after retries.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug']
            });
