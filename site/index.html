<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>303 News</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 17px;
            line-height: 1.6;
            color: #1a1a1a;
            background-color: #f5f0e8;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* --- Masthead --- */
        .masthead {
            text-align: center;
            padding-bottom: 16px;
            border-bottom: 4px double #1a1a1a;
            margin-bottom: 0;
        }

        .masthead-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.72em;
            color: #888;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .masthead-title {
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 0.08em;
            line-height: 1.1;
            margin: 6px 0;
        }

        .masthead-title .three-oh-three {
            color: #8b1a1a;
        }

        .masthead-dateline {
            font-size: 0.82em;
            color: #666;
            font-style: italic;
            margin-top: 4px;
            letter-spacing: 0.03em;
        }

        .masthead-rule {
            border: none;
            border-top: 1px solid #1a1a1a;
            margin-top: 10px;
        }

        /* --- Subscribe form --- */
        .subscribe-section {
            text-align: center;
            padding: 16px 16px 20px;
            margin-bottom: 0;
        }

        .subscribe-tagline {
            font-size: 0.92em;
            color: #888;
            margin-bottom: 12px;
            font-style: italic;
        }

        .subscribe-form {
            display: flex;
            gap: 8px;
            max-width: 420px;
            margin: 0 auto;
        }

        .subscribe-form input[type="email"] {
            flex: 1;
            padding: 10px 14px;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 0.92em;
            border: 1px solid #aaa;
            background: #fff;
            color: #1a1a1a;
            min-width: 0;
        }

        .subscribe-form input[type="email"]::placeholder {
            color: #999;
        }

        .subscribe-form input[type="email"]:focus {
            outline: none;
            border-color: #1a3a6a;
        }

        .subscribe-form button {
            padding: 10px 20px;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 0.88em;
            font-weight: 700;
            letter-spacing: 0.05em;
            background: #1a1a1a;
            color: #f5f0e8;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .subscribe-form button:hover {
            background: #333;
        }

        .subscribe-msg {
            font-size: 0.82em;
            margin-top: 10px;
            min-height: 1.2em;
            color: #666;
            font-style: italic;
        }

        .subscribe-msg.success {
            color: #2d6a2e;
        }

        .subscribe-msg.error {
            color: #8b1a1a;
        }

        /* --- Section Dividers --- */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0 18px;
        }

        .section-divider .rule {
            flex: 1;
            border: none;
            border-top: 2px solid #1a1a1a;
        }

        .section-divider .rule-light {
            border-top: 1px solid #bbb;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78em;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: #444;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .section-emoji {
            font-size: 1.2em;
            line-height: 1;
        }

        /* --- Lead Story --- */
        .lead-story {
            margin-bottom: 18px;
            padding-bottom: 16px;
            border-bottom: 1px dotted #ccc;
        }

        .lead-headline-row {
            display: block;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .lead-headline-row:hover .lead-title {
            color: #8b1a1a;
        }

        .lead-title {
            font-size: 1.45em;
            line-height: 1.25;
            color: #1a3a6a;
            font-weight: 700;
            transition: color 0.15s ease;
            display: block;
            margin-bottom: 6px;
        }

        .lead-deck {
            font-size: 1.0em;
            color: #555;
            font-style: italic;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .lead-source {
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #999;
            text-transform: uppercase;
        }

        .lead-body {
            display: none;
            margin-top: 12px;
            font-size: 1.02em;
            line-height: 1.8;
            color: #222;
            text-align: justify;
            hyphens: auto;
            -webkit-hyphens: auto;
        }

        .lead-story.open .lead-body {
            display: block;
        }

        .lead-body .drop-cap {
            float: left;
            font-size: 3.4em;
            line-height: 0.8;
            padding-right: 6px;
            padding-top: 4px;
            color: #8b1a1a;
            font-weight: 700;
        }

        .lead-body p {
            margin-bottom: 12px;
        }

        .end-mark {
            color: #8b1a1a;
            font-size: 0.7em;
            margin-left: 4px;
        }

        /* --- Top World Story --- */
        .top-story {
            margin-bottom: 18px;
            padding-bottom: 16px;
            border-bottom: 1px dotted #ccc;
        }

        .top-story-headline-row {
            display: block;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .top-story-headline-row:hover .top-story-title {
            color: #8b1a1a;
        }

        .top-story-title {
            font-size: 1.5em;
            line-height: 1.25;
            color: #1a3a6a;
            font-weight: 700;
            transition: color 0.15s ease;
            display: block;
            margin-bottom: 6px;
        }

        .top-story-deck {
            font-size: 1.0em;
            color: #555;
            font-style: italic;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .top-story-sources {
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #999;
            text-transform: uppercase;
        }

        .top-story-body {
            display: none;
            margin-top: 12px;
            font-size: 1.02em;
            line-height: 1.8;
            color: #222;
            text-align: justify;
            hyphens: auto;
            -webkit-hyphens: auto;
        }

        .top-story.open .top-story-body {
            display: block;
        }

        .top-story-body .drop-cap {
            float: left;
            font-size: 3.4em;
            line-height: 0.8;
            padding-right: 6px;
            padding-top: 4px;
            color: #8b1a1a;
            font-weight: 700;
        }

        .top-story-body p {
            margin-bottom: 12px;
        }

        .top-story-source-links {
            font-size: 0.82em;
            color: #888;
            margin-top: 8px;
        }

        .top-story-source-links a {
            color: #1a3a6a;
            text-decoration: none;
        }

        .top-story-source-links a:hover {
            text-decoration: underline;
        }

        /* --- Story items --- */
        .story-item {
            padding: 8px 0;
            border-bottom: 1px dotted #ccc;
        }

        .story-item:last-child {
            border-bottom: none;
        }

        .story-headline {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding: 4px 0;
            cursor: pointer;
            min-height: 44px;
            user-select: none;
            -webkit-user-select: none;
        }

        .story-headline:hover .story-title {
            color: #8b1a1a;
        }

        .story-bullet {
            color: #999;
            font-size: 0.6em;
            flex-shrink: 0;
            position: relative;
            top: -1px;
        }

        .story-title {
            font-size: 1.05em;
            color: #1a3a6a;
            line-height: 1.35;
            transition: color 0.15s ease;
        }

        .story-byline {
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: #999;
            text-transform: uppercase;
            margin-top: 2px;
            margin-left: 18px;
        }

        /* --- Story summary (expanded) --- */
        .story-body {
            display: none;
            margin: 8px 0 4px 18px;
            padding-left: 16px;
            border-left: 2px solid #ddd;
            font-size: 1.0em;
            line-height: 1.75;
            color: #222;
            text-align: justify;
            hyphens: auto;
            -webkit-hyphens: auto;
        }

        .story-item.open > .story-body {
            display: block;
        }

        .story-body p {
            margin-bottom: 10px;
        }

        /* --- Source link (inside expanded body) --- */
        .source-link {
            font-size: 0.88em;
            font-style: italic;
            color: #666;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dotted #ddd;
        }

        .source-link a {
            color: #1a3a6a;
            text-decoration: none;
            border-bottom: 1px dotted #1a3a6a;
        }

        .source-link a:hover {
            color: #8b1a1a;
            border-bottom-color: #8b1a1a;
        }

        /* --- Weather section (click-to-expand) --- */
        .weather-section {
            background: #f9f6ee;
            border-left: 3px solid #c9a959;
            padding: 12px 16px;
            margin-bottom: 18px;
        }
        .weather-summary-row {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            gap: 10px;
        }
        .weather-summary-row:hover .weather-expand-hint { color: #1a3a6a; }
        .weather-label {
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #888;
            white-space: nowrap;
        }
        .weather-one-liner {
            font-size: 0.95em;
            color: #333;
            flex: 1;
        }
        .weather-one-liner strong { color: #1a1a1a; }
        .weather-expand-hint {
            font-size: 0.78em;
            color: #aaa;
            letter-spacing: 0.05em;
            white-space: nowrap;
            transition: color 0.15s;
        }
        .weather-chevron {
            display: inline-block;
            transition: transform 0.2s ease;
            font-size: 0.7em;
        }
        .weather-section.open .weather-chevron { transform: rotate(90deg); }

        /* Expanded detail panel */
        .weather-detail-panel { display: none; margin-top: 14px; padding-top: 12px; border-top: 1px dotted #d5d0c4; }
        .weather-section.open .weather-detail-panel { display: block; }
        .weather-current-label { font-size: 0.68em; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #999; margin-bottom: 4px; }
        .weather-current-temp { font-size: 1.15em; color: #222; margin-bottom: 2px; }
        .weather-current-detail { font-size: 0.88em; color: #555; margin-bottom: 12px; }
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
        .weather-block { padding: 10px 0; }
        .weather-block:nth-child(odd) { padding-right: 16px; border-right: 1px dotted #d5d0c4; }
        .weather-block:nth-child(even) { padding-left: 16px; }
        .weather-block:nth-child(n+3) { border-top: 1px dotted #d5d0c4; }
        .weather-block-label { font-size: 0.68em; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #999; margin-bottom: 3px; }
        .weather-block-value { font-size: 1.05em; color: #222; }
        .weather-block-value strong { font-weight: 700; }
        .weather-block-sub { font-size: 0.82em; color: #777; margin-top: 2px; }
        .weather-tonight { padding-top: 12px; border-top: 1px dotted #d5d0c4; }
        .weather-tonight-label { font-size: 0.68em; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #999; margin-bottom: 4px; }
        .weather-tonight-text { font-size: 0.92em; color: #444; }
        .weather-callout { margin-top: 12px; padding: 8px 12px; background: #fdf6e3; border-left: 3px solid #c9a959; font-size: 0.88em; font-style: italic; color: #665; }
        .uv-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.78em; font-weight: 700; color: #fff; margin-left: 4px; vertical-align: middle; }
        .uv-low { background: #4caf50; }
        .uv-moderate { background: #ff9800; }
        .uv-high { background: #f44336; }
        .uv-very-high { background: #9c27b0; }
        .uv-extreme { background: #d50000; }
        .weather-attribution { font-size: 0.68em; color: #bbb; margin-top: 10px; text-align: right; }
        .weather-attribution a { color: #aaa; text-decoration: none; }

        /* --- Weekend Events section --- */
        .events-section {
            margin-bottom: 24px;
        }

        .event-item {
            padding: 8px 0;
            border-bottom: 1px dotted #ccc;
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-headline {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding: 4px 0;
            cursor: pointer;
            min-height: 44px;
            user-select: none;
            -webkit-user-select: none;
        }

        .event-headline:hover .event-title {
            color: #8b1a1a;
        }

        .event-title {
            font-size: 1.0em;
            color: #1a3a6a;
            line-height: 1.35;
            transition: color 0.15s ease;
        }

        .event-body {
            display: none;
            margin: 6px 0 4px 18px;
            padding-left: 16px;
            border-left: 2px solid #c9a959;
            font-size: 0.92em;
            line-height: 1.6;
            color: #444;
        }

        .event-item.open > .event-body {
            display: block;
        }

        .event-meta {
            font-size: 0.85em;
            color: #888;
            font-style: italic;
            margin-bottom: 6px;
        }

        .event-description {
            margin-bottom: 8px;
        }

        .event-link {
            font-size: 0.88em;
        }

        .event-link a {
            color: #1a3a6a;
            text-decoration: none;
            border-bottom: 1px dotted #1a3a6a;
        }

        .event-link a:hover {
            color: #8b1a1a;
            border-bottom-color: #8b1a1a;
        }

        /* --- Daily Laugh --- */
        .joke-section {
            text-align: center;
            padding: 22px 20px;
            margin-top: 8px;
        }

        .joke-text {
            font-size: 1.02em;
            color: #333;
            line-height: 1.55;
            margin-top: 8px;
            max-width: 620px;
            margin-left: auto;
            margin-right: auto;
        }

        .joke-credit {
            font-size: 0.85em;
            color: #999;
            font-style: italic;
            margin-top: 8px;
        }

        /* --- Empty state --- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-style: italic;
            font-size: 1.05em;
        }

        /* --- Day sections --- */
        .day-section {
            margin-bottom: 28px;
        }

        .day-header {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 6px 10px;
            padding: 12px 0;
            cursor: pointer;
            border-bottom: 1px solid #cccccc;
            user-select: none;
            -webkit-user-select: none;
            min-height: 48px;
        }

        .day-header:hover {
            opacity: 0.8;
        }

        .day-arrow {
            font-size: 0.7em;
            color: #888;
            transition: transform 0.2s ease;
            flex-shrink: 0;
            width: 14px;
            text-align: center;
        }

        .day-section.open > .day-header .day-arrow {
            transform: rotate(90deg);
        }

        .day-date {
            font-size: 1.2em;
            font-weight: 700;
            color: #444;
        }

        .day-section.today > .day-header .day-date {
            color: #8b1a1a;
        }

        .day-count {
            font-size: 0.82em;
            color: #888;
            font-style: italic;
        }

        .day-content {
            display: none;
            padding-top: 8px;
        }

        .day-section.open > .day-content {
            display: block;
        }

        /* --- Footer --- */
        .site-footer {
            text-align: center;
            padding: 20px 0;
            margin-top: 32px;
            border-top: 2px double #1a1a1a;
            font-size: 0.82em;
            color: #888;
            font-style: italic;
        }

        /* --- Mobile text bump (under 600px) --- */
        @media (max-width: 599px) {
            body {
                font-size: 18px;
            }

            .masthead-title {
                font-size: 2.2em;
            }

            .masthead-top {
                font-size: 0.65em;
            }

            .lead-title {
                font-size: 1.3em;
            }

            .weather-summary-row {
                flex-wrap: wrap;
            }
            .weather-one-liner {
                flex-basis: 100%;
                order: 3;
                margin-top: 4px;
            }
            .weather-grid {
                grid-template-columns: 1fr;
            }
            .weather-block:nth-child(odd) {
                padding-right: 0;
                border-right: none;
            }
            .weather-block:nth-child(even) {
                padding-left: 0;
                border-top: 1px dotted #d5d0c4;
            }
        }

        /* --- Small mobile tweaks (under 400px) --- */
        @media (max-width: 399px) {
            .masthead-title {
                font-size: 1.8em;
            }

            .day-date {
                font-size: 1.05em;
            }
        }

        /* --- Desktop styles (600px+) --- */
        @media (min-width: 600px) {
            .container {
                padding: 32px 24px 60px;
            }

            .masthead-title {
                font-size: 2.8em;
            }

            .day-section {
                margin-bottom: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="masthead">
            <div class="masthead-top">
                <span id="masthead-vol"></span>
                <span>Denver, Colorado</span>
            </div>
            <h1 class="masthead-title"><span class="three-oh-three">303</span> NEWS</h1>
            <div class="masthead-dateline" id="masthead-date"></div>
            <hr class="masthead-rule">
        </header>

        <div class="subscribe-section">
            <p class="subscribe-tagline">No ads and no BS, just clean daily news.</p>
            <form class="subscribe-form" id="subscribe-form"
                  action="https://buttondown.com/api/emails/embed-subscribe/jimcoleman1"
                  method="post" target="subscribe-target">
                <input type="email" name="email" placeholder="Your email" required id="subscribe-email" autocomplete="email">
                <input type="hidden" name="embed" value="1">
                <input type="hidden" name="tag" value="website">
                <button type="submit">SUBSCRIBE</button>
            </form>
            <iframe name="subscribe-target" id="subscribe-target" style="display:none"></iframe>
            <p class="subscribe-msg" id="subscribe-msg"></p>
        </div>

        <main id="digest-content">
            <div class="empty-state">Loading...</div>
        </main>

        <footer class="site-footer">
            303 News -- Updated daily at 7:00 AM MT
        </footer>
    </div>

    <script>
        (function() {
            'use strict';

            var CATEGORY_ORDER = ['other', 'politics', 'business', 'crime', 'sports'];
            var CATEGORY_LABELS = {
                other: 'Denver Metro News',
                politics: 'Politics & Government',
                business: 'Business & Economy',
                crime: 'Crime & Public Safety',
                sports: 'Denver Sports'
            };
            var CATEGORY_EMOJIS = {
                other: '\uD83C\uDFD9\uFE0F',
                politics: '\uD83C\uDFDB\uFE0F',
                business: '\uD83D\uDCBC',
                crime: '\uD83D\uDEA8',
                sports: '\uD83C\uDFC8'
            };

            // Issue number: Jan 12, 2026 = Issue No. 1
            var ISSUE_START = new Date(2026, 0, 12);

            // --- Masthead ---
            function updateMasthead() {
                var now = new Date();
                var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
                var months = ['January','February','March','April','May','June',
                              'July','August','September','October','November','December'];
                document.getElementById('masthead-date').textContent =
                    days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
                var diffDays = Math.floor((now - ISSUE_START) / (86400000));
                var issueNum = Math.max(1, diffDays + 1);
                document.getElementById('masthead-vol').textContent = 'Vol. 1, No. ' + issueNum;
            }

            function getWeatherEmoji(conditions) {
                var c = (conditions || '').toLowerCase();
                if (c.indexOf('snow') >= 0) return '\u2744\uFE0F';
                if (c.indexOf('rain') >= 0 || c.indexOf('drizzle') >= 0) return '\uD83C\uDF27\uFE0F';
                if (c.indexOf('thunder') >= 0) return '\u26C8\uFE0F';
                if (c.indexOf('overcast') >= 0) return '\u2601\uFE0F';
                if (c.indexOf('cloud') >= 0) return '\u26C5';
                if (c.indexOf('fog') >= 0 || c.indexOf('mist') >= 0) return '\uD83C\uDF2B\uFE0F';
                if (c.indexOf('clear') >= 0 || c.indexOf('sunny') >= 0) return '\u2600\uFE0F';
                return '\uD83C\uDF24\uFE0F';
            }

            // Weather bar removed -- full weather now inside each day's section

            updateMasthead();

            // --- Subscribe form ---
            var subForm = document.getElementById('subscribe-form');
            var subEmail = document.getElementById('subscribe-email');
            var subMsg = document.getElementById('subscribe-msg');
            var subTarget = document.getElementById('subscribe-target');

            subForm.addEventListener('submit', function() {
                var email = subEmail.value.trim();
                if (!email) return;
                subMsg.textContent = 'Subscribing...';
                subMsg.className = 'subscribe-msg';
            });

            subTarget.addEventListener('load', function() {
                if (!subEmail.value && !subMsg.textContent) return;
                subMsg.textContent = "You're in! Check your email to confirm, then watch for your first digest.";
                subMsg.className = 'subscribe-msg success';
                subEmail.value = '';
            });

            // --- Helpers ---
            function getLastNDates(n) {
                var dates = [];
                var now = new Date();
                for (var i = 0; i < n; i++) {
                    var d = new Date(now);
                    d.setDate(d.getDate() - i);
                    dates.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'));
                }
                return dates;
            }

            function getTodayStr() {
                var d = new Date();
                return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            }

            function groupByCategory(stories) {
                var groups = {};
                for (var i = 0; i < stories.length; i++) {
                    var cat = stories[i].category || 'other';
                    if (!CATEGORY_LABELS[cat]) cat = 'other';
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(stories[i]);
                }
                return groups;
            }

            function escapeHTML(str) {
                var div = document.createElement('div');
                div.appendChild(document.createTextNode(str));
                return div.innerHTML;
            }

            function getFirstSentence(text) {
                if (!text) return '';
                var idx = text.indexOf('. ');
                if (idx === -1) idx = text.indexOf('.\n');
                if (idx === -1) return text.split('\n\n')[0];
                return text.substring(0, idx + 1);
            }

            function summaryToHTMLWithEndMark(summary) {
                if (!summary) return '';
                var paragraphs = summary.split('\n\n');
                var html = '';
                for (var i = 0; i < paragraphs.length; i++) {
                    var text = paragraphs[i].trim();
                    if (text) {
                        if (i === paragraphs.length - 1) {
                            html += '<p>' + escapeHTML(text) + '<span class="end-mark"> \u25AE</span></p>';
                        } else {
                            html += '<p>' + escapeHTML(text) + '</p>';
                        }
                    }
                }
                return html;
            }

            function summaryToHTMLWithDropCap(summary) {
                if (!summary) return '';
                var paragraphs = summary.split('\n\n');
                var html = '';
                for (var i = 0; i < paragraphs.length; i++) {
                    var text = paragraphs[i].trim();
                    if (text) {
                        var inner;
                        if (i === 0) {
                            inner = '<span class="drop-cap">' + escapeHTML(text.charAt(0)) + '</span>' + escapeHTML(text.slice(1));
                        } else {
                            inner = escapeHTML(text);
                        }
                        if (i === paragraphs.length - 1) {
                            inner += '<span class="end-mark"> \u25AE</span>';
                        }
                        html += '<p>' + inner + '</p>';
                    }
                }
                return html;
            }

            // --- Section Divider ---
            function renderSectionDivider(cat) {
                var div = document.createElement('div');
                div.className = 'section-divider';
                div.innerHTML = '<hr class="rule">' +
                    '<div class="section-label"><span class="section-emoji">' +
                    (CATEGORY_EMOJIS[cat] || '') + '</span> ' +
                    escapeHTML(CATEGORY_LABELS[cat] || cat) + '</div>' +
                    '<hr class="rule">';
                return div;
            }

            // --- Top World Story ---
            function renderTopStory(topStory) {
                if (!topStory || !topStory.headline || !topStory.summary) return null;

                // Section divider
                var divider = document.createElement('div');
                divider.className = 'section-divider';
                divider.innerHTML = '<hr class="rule">' +
                    '<div class="section-label"><span class="section-emoji">\uD83C\uDF0D</span> Top Story in the World</div>' +
                    '<hr class="rule">';

                var item = document.createElement('article');
                item.className = 'top-story';

                var headlineRow = document.createElement('div');
                headlineRow.className = 'top-story-headline-row';

                var title = document.createElement('span');
                title.className = 'top-story-title';
                title.textContent = topStory.headline;
                headlineRow.appendChild(title);

                var deck = document.createElement('div');
                deck.className = 'top-story-deck';
                deck.textContent = getFirstSentence(topStory.summary);
                headlineRow.appendChild(deck);

                // Sources byline
                var sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'top-story-sources';
                if (topStory.sources && topStory.sources.length > 0) {
                    sourcesDiv.textContent = topStory.sources.map(function(s) { return s.name; }).join(' | ');
                }
                headlineRow.appendChild(sourcesDiv);

                headlineRow.addEventListener('click', function() {
                    item.classList.toggle('open');
                });

                var body = document.createElement('div');
                body.className = 'top-story-body';
                body.innerHTML = summaryToHTMLWithDropCap(topStory.summary);

                // Source links
                if (topStory.sources && topStory.sources.length > 0) {
                    var sourceLinks = document.createElement('div');
                    sourceLinks.className = 'top-story-source-links';
                    var linksHTML = 'Sources: ';
                    for (var i = 0; i < topStory.sources.length; i++) {
                        if (i > 0) linksHTML += ' &middot; ';
                        linksHTML += '<a href="' + escapeHTML(topStory.sources[i].url) +
                            '" target="_blank" rel="noopener noreferrer">' +
                            escapeHTML(topStory.sources[i].name) + '</a>';
                    }
                    sourceLinks.innerHTML = linksHTML;
                    body.appendChild(sourceLinks);
                }

                item.appendChild(headlineRow);
                item.appendChild(body);

                var frag = document.createDocumentFragment();
                frag.appendChild(divider);
                frag.appendChild(item);
                return frag;
            }

            // --- Lead Story ---
            function renderLeadStory(story, dateStr, idx) {
                var item = document.createElement('article');
                item.className = 'lead-story';
                item.id = 'story-' + dateStr + '-' + idx;

                var headlineRow = document.createElement('div');
                headlineRow.className = 'lead-headline-row';

                var title = document.createElement('span');
                title.className = 'lead-title';
                title.textContent = story.headline;
                headlineRow.appendChild(title);

                var deck = document.createElement('div');
                deck.className = 'lead-deck';
                deck.textContent = getFirstSentence(story.summary);
                headlineRow.appendChild(deck);

                var source = document.createElement('div');
                source.className = 'lead-source';
                source.textContent = story.source;
                headlineRow.appendChild(source);

                headlineRow.addEventListener('click', function() {
                    item.classList.toggle('open');
                });

                var body = document.createElement('div');
                body.className = 'lead-body';
                body.innerHTML = summaryToHTMLWithDropCap(story.summary);

                var sourceLink = document.createElement('div');
                sourceLink.className = 'source-link';
                sourceLink.innerHTML = 'Source: <a href="' + escapeHTML(story.url) +
                    '" target="_blank" rel="noopener noreferrer">' +
                    escapeHTML(story.source) + '</a>';
                body.appendChild(sourceLink);

                item.appendChild(headlineRow);
                item.appendChild(body);
                return item;
            }

            // --- Regular Story ---
            function renderStory(story, dateStr, idx) {
                var item = document.createElement('div');
                item.className = 'story-item';
                item.id = 'story-' + dateStr + '-' + idx;

                var headline = document.createElement('div');
                headline.className = 'story-headline';
                headline.innerHTML = '<span class="story-bullet">&#9670;</span>' +
                    '<span class="story-title">' + escapeHTML(story.headline) + '</span>';

                headline.addEventListener('click', function() {
                    item.classList.toggle('open');
                });

                var byline = document.createElement('div');
                byline.className = 'story-byline';
                byline.textContent = story.source;

                var body = document.createElement('div');
                body.className = 'story-body';
                body.innerHTML = summaryToHTMLWithEndMark(story.summary);

                var sourceLink = document.createElement('div');
                sourceLink.className = 'source-link';
                sourceLink.innerHTML = 'Source: <a href="' + escapeHTML(story.url) +
                    '" target="_blank" rel="noopener noreferrer">' +
                    escapeHTML(story.source) + '</a>';
                body.appendChild(sourceLink);

                item.appendChild(headline);
                item.appendChild(byline);
                item.appendChild(body);
                return item;
            }

            // --- Weather (click-to-expand) ---
            function renderWeather(weather) {
                if (!weather || !weather.conditions) return null;
                var div = document.createElement('div');
                div.className = 'weather-section';

                // Summary row (always visible, clickable)
                var row = document.createElement('div');
                row.className = 'weather-summary-row';
                row.onclick = function() { div.classList.toggle('open'); };

                var label = document.createElement('div');
                label.className = 'weather-label';
                label.textContent = '\uD83C\uDF24\uFE0F Today\'s Forecast';
                row.appendChild(label);

                var oneLiner = document.createElement('div');
                oneLiner.className = 'weather-one-liner';
                oneLiner.innerHTML = escapeHTML(weather.conditions) + ' \u2014 <strong>High ' + weather.high + '\u00B0F</strong> / Low ' + weather.low + '\u00B0F';
                row.appendChild(oneLiner);

                var hint = document.createElement('div');
                hint.className = 'weather-expand-hint';
                hint.innerHTML = '<span class="weather-chevron">\u25B6</span> Details';
                row.appendChild(hint);

                div.appendChild(row);

                // Detail panel (hidden until expanded)
                var panel = document.createElement('div');
                panel.className = 'weather-detail-panel';

                // Current conditions
                var cur = weather.current || {};
                if (cur.temp != null) {
                    var curLabel = document.createElement('div');
                    curLabel.className = 'weather-current-label';
                    curLabel.textContent = '\uD83D\uDCCD Current Conditions' + (cur.time_label ? ' (as of ' + cur.time_label + ')' : '');
                    panel.appendChild(curLabel);

                    var curTemp = document.createElement('div');
                    curTemp.className = 'weather-current-temp';
                    curTemp.innerHTML = '<strong>' + cur.temp + '\u00B0F</strong>' + (cur.feels_like != null ? ' <span style="font-size:0.85em;color:#777">(feels like ' + cur.feels_like + '\u00B0F)</span>' : '');
                    panel.appendChild(curTemp);

                    var curDetail = document.createElement('div');
                    curDetail.className = 'weather-current-detail';
                    var parts = [escapeHTML(cur.conditions || '')];
                    if (cur.humidity != null) parts.push('Humidity ' + cur.humidity + '%');
                    if (cur.pressure_inhg) parts.push('Pressure ' + cur.pressure_inhg + ' inHg');
                    curDetail.innerHTML = parts.join(' &bull; ');
                    panel.appendChild(curDetail);
                }

                // 2x2 grid
                var grid = document.createElement('div');
                grid.className = 'weather-grid';

                // Temperature block
                var b1 = document.createElement('div');
                b1.className = 'weather-block';
                b1.innerHTML = '<div class="weather-block-label">\uD83C\uDF21\uFE0F Temperature</div>' +
                    '<div class="weather-block-value"><strong>High ' + weather.high + '\u00B0F</strong> / Low ' + weather.low + '\u00B0F</div>' +
                    (weather.feels_high != null && weather.feels_low != null ? '<div class="weather-block-sub">Feels like ' + weather.feels_high + '\u00B0 / ' + weather.feels_low + '\u00B0</div>' : '');
                grid.appendChild(b1);

                // Wind block
                var windDir = (cur.wind_dir || '');
                var b2 = document.createElement('div');
                b2.className = 'weather-block';
                b2.innerHTML = '<div class="weather-block-label">\uD83D\uDCA8 Wind</div>' +
                    '<div class="weather-block-value">' + (windDir ? windDir + ' ' : '') + weather.wind_mph + ' mph</div>' +
                    (weather.wind_gusts_mph ? '<div class="weather-block-sub">Gusts up to ' + weather.wind_gusts_mph + ' mph</div>' : '');
                grid.appendChild(b2);

                // Sun block
                if (weather.sunrise && weather.sunset) {
                    var b3 = document.createElement('div');
                    b3.className = 'weather-block';
                    b3.innerHTML = '<div class="weather-block-label">\u2600\uFE0F Sun</div>' +
                        '<div class="weather-block-value">' + escapeHTML(weather.sunrise) + ' \u2013 ' + escapeHTML(weather.sunset) + '</div>' +
                        (weather.daylight ? '<div class="weather-block-sub">' + escapeHTML(weather.daylight) + ' daylight</div>' : '');
                    grid.appendChild(b3);
                }

                // UV block
                if (weather.uv_index != null) {
                    var b4 = document.createElement('div');
                    b4.className = 'weather-block';
                    b4.innerHTML = '<div class="weather-block-label">\uD83D\uDE0E UV Index</div>' +
                        '<div class="weather-block-value">' + weather.uv_index + ' <span class="uv-badge ' + escapeHTML(weather.uv_class || 'uv-low') + '">' + escapeHTML(weather.uv_label || '') + '</span></div>' +
                        (weather.uv_advice ? '<div class="weather-block-sub">' + escapeHTML(weather.uv_advice) + '</div>' : '');
                    grid.appendChild(b4);
                }

                panel.appendChild(grid);

                // Tonight row
                var tonightDiv = document.createElement('div');
                tonightDiv.className = 'weather-tonight';
                var precipStr = '';
                var prob = weather.precipitation_probability || 0;
                var snowIn = weather.snowfall_inches || 0;
                var rainIn = weather.precipitation_inches || 0;
                if (snowIn > 0) {
                    precipStr = ' \u2022 ~' + snowIn.toFixed(1) + '" snow expected';
                } else if (rainIn > 0) {
                    precipStr = ' \u2022 ~' + rainIn.toFixed(2) + '" rain expected';
                } else if (prob > 0) {
                    precipStr = ' \u2022 ' + prob + '% chance of precipitation';
                }
                tonightDiv.innerHTML = '<div class="weather-tonight-label">\uD83C\uDF19 Tonight</div>' +
                    '<div class="weather-tonight-text">Low <strong>' + weather.low + '\u00B0F</strong>' + precipStr + '</div>';
                panel.appendChild(tonightDiv);

                // Notable callout
                if (weather.notable) {
                    var callout = document.createElement('div');
                    callout.className = 'weather-callout';
                    callout.innerHTML = '\uD83C\uDF21\uFE0F ' + escapeHTML(weather.notable);
                    panel.appendChild(callout);
                }

                // Attribution
                var attr = document.createElement('div');
                attr.className = 'weather-attribution';
                attr.innerHTML = 'Data from <a href="https://open-meteo.com" target="_blank">Open-Meteo</a>';
                panel.appendChild(attr);

                div.appendChild(panel);
                return div;
            }

            // --- Weekend Events ---
            function renderWeekendEvents(events) {
                if (!events || events.length === 0) return null;
                var frag = document.createDocumentFragment();

                var divider = document.createElement('div');
                divider.className = 'section-divider';
                divider.innerHTML = '<hr class="rule">' +
                    '<div class="section-label"><span class="section-emoji">\uD83C\uDFAD</span> Weekend Activity Guide</div>' +
                    '<hr class="rule">';
                frag.appendChild(divider);

                var section = document.createElement('div');
                section.className = 'events-section';

                for (var i = 0; i < events.length; i++) {
                    var evt = events[i];
                    var item = document.createElement('div');
                    item.className = 'event-item';

                    var headline = document.createElement('div');
                    headline.className = 'event-headline';
                    headline.innerHTML = '<span class="story-bullet">&#9670;</span>' +
                        '<span class="event-title">' + escapeHTML(evt.title) + '</span>';

                    headline.addEventListener('click', (function(el) {
                        return function() { el.classList.toggle('open'); };
                    })(item));

                    item.appendChild(headline);

                    var body = document.createElement('div');
                    body.className = 'event-body';

                    var metaParts = [];
                    if (evt.date) metaParts.push(evt.date);
                    if (evt.time) metaParts.push(evt.time);
                    if (evt.location) metaParts.push(evt.location);
                    if (metaParts.length > 0) {
                        var meta = document.createElement('div');
                        meta.className = 'event-meta';
                        meta.textContent = metaParts.join(' // ');
                        body.appendChild(meta);
                    }

                    if (evt.description) {
                        var desc = document.createElement('div');
                        desc.className = 'event-description';
                        desc.textContent = evt.description;
                        body.appendChild(desc);
                    }

                    if (evt.url) {
                        var linkDiv = document.createElement('div');
                        linkDiv.className = 'event-link';
                        linkDiv.innerHTML = '<a href="' + escapeHTML(evt.url) +
                            '" target="_blank" rel="noopener noreferrer">More info &rarr;</a>';
                        body.appendChild(linkDiv);
                    }

                    item.appendChild(body);
                    section.appendChild(item);
                }

                frag.appendChild(section);
                return frag;
            }

            // --- Render Day ---
            function renderDay(data, isToday) {
                var section = document.createElement('div');
                section.className = 'day-section' + (isToday ? ' today' : '');
                section.setAttribute('data-date', data.date);

                var header = document.createElement('div');
                header.className = 'day-header';
                var storyCount = (data.stories ? data.stories.length : 0) + (data.topStory ? 1 : 0);
                var countWord = storyCount === 1 ? 'story' : 'stories';
                header.innerHTML = '<span class="day-arrow">&#9654;</span>' +
                    '<span class="day-date">' + escapeHTML(data.dateFormatted) + '</span>' +
                    '<span class="day-count">' + storyCount + ' ' + countWord + '</span>';

                header.addEventListener('click', function() {
                    section.classList.toggle('open');
                });

                var content = document.createElement('div');
                content.className = 'day-content';

                // Weather section
                var weatherEl = renderWeather(data.weather);
                if (weatherEl) {
                    content.appendChild(weatherEl);
                }

                // Top World Story
                var topStoryEl = renderTopStory(data.topStory);
                if (topStoryEl) {
                    content.appendChild(topStoryEl);
                }

                // Weekend Events
                var eventsEl = renderWeekendEvents(data.weekendEvents);
                if (eventsEl) {
                    content.appendChild(eventsEl);
                }

                // News stories with section dividers
                if (data.stories && data.stories.length > 0) {
                    var groups = groupByCategory(data.stories);
                    var globalIdx = 0;
                    var isFirstStory = true;

                    for (var c = 0; c < CATEGORY_ORDER.length; c++) {
                        var cat = CATEGORY_ORDER[c];
                        if (!groups[cat] || groups[cat].length === 0) continue;

                        content.appendChild(renderSectionDivider(cat));

                        for (var s = 0; s < groups[cat].length; s++) {
                            if (isFirstStory) {
                                content.appendChild(renderLeadStory(groups[cat][s], data.date, globalIdx));
                                isFirstStory = false;
                            } else {
                                content.appendChild(renderStory(groups[cat][s], data.date, globalIdx));
                            }
                            globalIdx++;
                        }
                    }
                }

                // Daily Laugh
                if (data.joke && data.joke.joke) {
                    var jokeDivider = document.createElement('div');
                    jokeDivider.className = 'section-divider';
                    jokeDivider.innerHTML = '<hr class="rule rule-light">' +
                        '<div class="section-label"><span class="section-emoji">\uD83D\uDE02</span> Daily Laugh</div>' +
                        '<hr class="rule rule-light">';
                    content.appendChild(jokeDivider);

                    var jokeDiv = document.createElement('div');
                    jokeDiv.className = 'joke-section';

                    var jokeText = document.createElement('div');
                    jokeText.className = 'joke-text';
                    jokeText.textContent = data.joke.joke;
                    jokeDiv.appendChild(jokeText);

                    var credit = document.createElement('div');
                    credit.className = 'joke-credit';
                    credit.textContent = '\u2014 ' + data.joke.comedian;
                    jokeDiv.appendChild(credit);

                    content.appendChild(jokeDiv);
                }

                section.appendChild(header);
                section.appendChild(content);

                if (isToday) {
                    section.classList.add('open');
                }

                return section;
            }

            // --- Deep linking ---
            function handleDeepLink() {
                var hash = window.location.hash;
                if (!hash || hash.length < 2) return;

                var match = hash.match(/^#story-(\d{4}-\d{2}-\d{2})-(\d+)$/);
                if (!match) return;

                var targetDate = match[1];
                var targetIdx = parseInt(match[2], 10);
                var storyId = 'story-' + targetDate + '-' + targetIdx;

                var daySection = document.querySelector('.day-section[data-date="' + targetDate + '"]');
                if (daySection) {
                    daySection.classList.add('open');
                }

                var storyEl = document.getElementById(storyId);
                if (storyEl) {
                    storyEl.classList.add('open');
                    setTimeout(function() {
                        storyEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                }
            }

            // --- Init ---
            function init() {
                var dates = getLastNDates(7);
                var todayStr = getTodayStr();
                var container = document.getElementById('digest-content');
                var loadedCount = 0;
                var pending = dates.length;
                var results = {};

                dates.forEach(function(dateStr) {
                    fetch('data/' + dateStr + '.json')
                        .then(function(resp) {
                            if (!resp.ok) throw new Error('Not found');
                            return resp.json();
                        })
                        .then(function(data) {
                            results[dateStr] = data;
                            loadedCount++;
                        })
                        .catch(function() {})
                        .finally(function() {
                            pending--;
                            if (pending === 0) {
                                renderAll(dates, results, todayStr, container, loadedCount);
                                handleDeepLink();
                            }
                        });
                });
            }

            function renderAll(dates, results, todayStr, container, loadedCount) {
                container.innerHTML = '';

                if (loadedCount === 0) {
                    container.innerHTML = '<div class="empty-state">No stories available yet. Check back tomorrow morning.</div>';
                    return;
                }

                for (var i = 0; i < dates.length; i++) {
                    var dateStr = dates[i];
                    if (!results[dateStr]) continue;
                    var isToday = (dateStr === todayStr);
                    container.appendChild(renderDay(results[dateStr], isToday));
                }
            }

            window.addEventListener('hashchange', handleDeepLink);

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
